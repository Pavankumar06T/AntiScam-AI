[pytest]
testpaths = tests
pythonpath = .
markers =
    live: hits the real Groq API; auto-skipped when GROQ_API_KEY is unset.
    stress: expensive burst tests; opt in with `pytest -m stress`.
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::PendingDeprecationWarning
# Stress tests are excluded by default: one burst costs ~2 minutes of the
# free-tier token budget and would rate-limit every test after it.
addopts = -q -m "not stress"
log_cli = false
